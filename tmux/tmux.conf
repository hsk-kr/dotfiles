# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# act like vim
set-window-option -g mode-keys vi

# plugins
set -g @plugin 'tmux-plugins/tpm' 

# tmux
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

bind-key -N "Reload the config file" r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# command sender popup (prefix + cs)
bind-key c switch-client -T cmd-sender
bind-key -T cmd-sender s run-shell '~/dev-setup-manager/dotfiles/tmux/command-sender/open.sh'

# send Enter to a specific pane (prefix + e + 1-5)
bind-key e switch-client -T send-enter
bind-key -T send-enter 1 send-keys -t :.1 C-m
bind-key -T send-enter 2 send-keys -t :.2 C-m
bind-key -T send-enter 3 send-keys -t :.3 C-m
bind-key -T send-enter 4 send-keys -t :.4 C-m
bind-key -T send-enter 5 send-keys -t :.5 C-m

# tmux-md: markdown viewer popup
run '~/dev-setup-manager/dotfiles/tmux-md/tmux-md.tmux'

# must keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
